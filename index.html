<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loupe — Find your niche</title>
  <meta name="description" content="Discover local brands in Vilnius. Fashion, food, beauty, home goods and more from independent makers." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
</head>
<body>

  <div id="app">
    <!-- HEADER -->
    <header class="header">
      <div class="header-top">
        <svg class="header-logo" width="32" height="32" viewBox="0 0 40 40" fill="none">
          <path d="M8 28c0-8 6-16 14-16s14 8 14 16" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" fill="none"/>
          <circle cx="28" cy="12" r="6" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" fill="none"/>
          <line x1="32" y1="16" x2="38" y2="22" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
        </svg>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search here ..." />
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
      </div>
      <div class="header-bottom">
        <div>
          <div class="header-title">Loupe</div>
          <div class="header-subtitle">Find your niche</div>
        </div>
        <div id="headerRight">
          <div class="notification-bell">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="content"></main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-nav="home" onclick="navigate('home')">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-nav="explore" onclick="navigate('explore')">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Explore</span>
      </button>
      <button class="nav-btn" data-nav="nearbuy" onclick="navigate('nearbuy')">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Near buy</span>
      </button>
      <button class="nav-btn" data-nav="saved" onclick="navigate('saved')">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>Saved</span>
      </button>
      <button class="nav-btn" data-nav="profile" onclick="navigate('profile')">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
