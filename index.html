<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loupe — Vilnius Local Brands</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="shell">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">Loupe</div>
      <div class="tagline">Vilnius Local Brands</div>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search brands…" oninput="onSearch()" />
      </div>
    </div>

    <div class="sidebar-section-label">Navigation</div>

    <div class="nav-item active" id="nav-home" onclick="navigate('home')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </div>
    <div class="nav-item" id="nav-explore" onclick="navigate('explore')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      All Brands
    </div>
    <div class="nav-item" id="nav-saved" onclick="navigate('saved')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Saved
    </div>

    <div class="sidebar-section-label">Categories</div>
    <div class="category-list" id="catList"></div>

    <div class="sidebar-footer">
      © 2025 Loupe · Vilnius<br>Celebrating local makers
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Welcome back</div>
        <div class="topbar-meta" id="topbarMeta">Discover Vilnius' finest local brands</div>
      </div>
      <div class="topbar-actions">
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setViewMode('grid')" title="Grid view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="listViewBtn" onclick="setViewMode('list')" title="List view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <select class="sort-select" id="sortSelect" onchange="render()">
          <option value="default">Default order</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select>
      </div>
    </div>

    <div class="content-area" id="contentArea"></div>
  </main>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-logo" id="modalLogo"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-tag" id="modalTag"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="modalSave" onclick="toggleSaveModal()">♡ Save brand</button>
      <button class="btn-secondary" id="modalVisit" onclick="visitModal()">Visit ↗</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
