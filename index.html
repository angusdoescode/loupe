<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loupe — Vilnius Local Brands</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
 --cream: #ffffff;
  --maroon: #96141e;
  --maroon-light: #b01a26;
  --maroon-pale: #f5dde0;
  --ink: #1a1410;
  --muted: #7a6f67;
  --border: #e0d8d8;
  --white: #ffffff;
  --card-hover: #fdf8f8;
  --sidebar-w: 240px;
}
html, body { height: 100%; background: var(--cream); color: var(--ink); font-family: 'Anton',  sans-serif; font-size: 15px; overflow: hidden; }
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--maroon); display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
.sidebar-logo { padding: 32px 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-logo .wordmark { font-family: 'Anton',  sans-serif; font-size: 28px; color: var(--cream); letter-spacing: -0.5px; }
.sidebar-logo .tagline { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 5px; }

.sidebar-search { padding: 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.5; pointer-events: none; }
.search-wrap input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 9px 12px 9px 34px; color: var(--cream); font-family: 'Anton',  sans-serif; font-size: 13px; }
.search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
.search-wrap input:focus { outline: none; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }

.sidebar-label { padding: 18px 20px 8px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: var(--cream); }
.nav-item.active { background: rgba(255,255,255,0.1); color: var(--cream); border-left-color: var(--cream); font-weight: 500; }

.cat-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; color: rgba(255,255,255,0.65); cursor: pointer; font-size: 13.5px; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
.cat-item:hover { background: rgba(255,255,255,0.06); color: var(--cream); }
.cat-item.active { background: rgba(255,255,255,0.1); color: var(--cream); border-left-color: rgba(255,255,255,0.6); font-weight: 500; }
.cat-item-left { display: flex; align-items: center; gap: 8px; }
.cat-emoji { font-size: 15px; }
.cat-count { font-size: 11px; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); border-radius: 20px; padding: 1px 8px; }
.cat-item.active .cat-count { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.85); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--cream); flex-shrink: 0; }
.topbar-left .topbar-title { font-family: 'Anton',  sans-serif; font-size: 22px; color: var(--ink); }
.topbar-left .topbar-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.back-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'Anton',  sans-serif; }
.back-btn:hover { border-color: var(--maroon); color: var(--maroon); }
.view-toggle { display: flex; gap: 4px; }
.view-btn { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); transition: all 0.15s; }
.view-btn.active, .view-btn:hover { background: var(--maroon); border-color: var(--maroon); color: white; }

.content { flex: 1; overflow-y: auto; padding: 28px 32px; }

/* ── HOME STATS ── */
.stats-strip { display: flex; gap: 16px; margin-bottom: 36px; }
.stat-card { flex: 1; background: var(--white); border: 1.5px solid var(--border); border-radius: 14px; padding: 22px 24px; transition: border-color 0.15s, box-shadow 0.15s; }
.stat-card.clickable { cursor: pointer; }
.stat-card.clickable:hover { border-color: var(--maroon); box-shadow: 0 4px 16px rgba(107,30,46,0.1); }
.stat-card .stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.stat-card .stat-num { font-family: 'Anton',  sans-serif; font-size: 36px; color: var(--maroon); line-height: 1; }
.stat-card .stat-desc { font-size: 13px; color: var(--muted); margin-top: 6px; }
.stat-card.clickable:hover .stat-desc { color: var(--maroon); }

.section-title { font-family: 'Anton',  sans-serif; font-size: 18px; color: var(--ink); margin-bottom: 16px; }
.section-divider { margin: 32px 0; border: none; border-top: 1px solid var(--border); }

/* ── CATEGORY HUB ── */
.cat-hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }
.cat-hub-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 28px 24px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 8px; }
.cat-hub-card:hover { border-color: var(--maroon); box-shadow: 0 6px 24px rgba(107,30,46,0.12); transform: translateY(-2px); }
.hub-emoji { font-size: 36px; }
.hub-name { font-family: 'Anton',  sans-serif; font-size: 17px; color: var(--ink); margin-top: 4px; }
.hub-count { font-size: 12px; color: var(--muted); }
.hub-subdesc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.hub-arrow { margin-top: 10px; color: var(--maroon); font-size: 18px; opacity: 0; transition: opacity 0.2s; }
.cat-hub-card:hover .hub-arrow { opacity: 1; }

/* ── BRAND GRID ── */
.brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
.brand-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s; }
.brand-card:hover { box-shadow: 0 6px 24px rgba(26,20,16,0.1); border-color: #c4b8ac; transform: translateY(-2px); }
.card-logo { height: 130px; display: flex; align-items: center; justify-content: center; background: var(--white); border-bottom: 1px solid var(--border); font-size: 42px; position: relative; padding: 16px; }
.card-logo img { max-width: 90px; max-height: 90px; object-fit: contain; border-radius: 12px; }
.card-heart { position: absolute; top: 10px; right: 12px; font-size: 20px; cursor: pointer; color: var(--muted); transition: color 0.15s, transform 0.15s; }
.card-heart:hover, .card-heart.saved { color: var(--maroon); transform: scale(1.2); }
.card-body { padding: 16px 18px; }
.card-cat-tag { display: inline-block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--maroon); background: rgba(107,30,46,0.08); border-radius: 4px; padding: 2px 8px; margin-bottom: 8px; }
.card-name { font-family: 'Anton',  sans-serif; font-size: 16px; color: var(--ink); margin-bottom: 6px; }
.card-desc { font-size: 12.5px; color: var(--muted); line-height: 1.55; }
.card-link { display: inline-flex; align-items: center; gap: 5px; margin-top: 12px; font-size: 12px; color: var(--maroon); text-decoration: none; border: 1px solid rgba(107,30,46,0.25); border-radius: 6px; padding: 5px 10px; transition: background 0.15s; }
.card-link:hover { background: rgba(107,30,46,0.06); }

/* ── LIST VIEW ── */
.brand-list { display: flex; flex-direction: column; gap: 10px; }
.brand-list-item { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 18px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
.brand-list-item:hover { border-color: #c4b8ac; box-shadow: 0 3px 12px rgba(26,20,16,0.07); }
.list-logo { width: 52px; height: 52px; border-radius: 10px; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.list-logo img { max-width: 36px; max-height: 36px; object-fit: contain; }
.list-info { flex: 1; min-width: 0; }
.list-name { font-family: 'Anton',  sans-serif; font-size: 15px; color: var(--ink); }
.list-desc { font-size: 12.5px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.list-cat-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--maroon); background: rgba(107,30,46,0.08); border-radius: 4px; padding: 2px 7px; }
.list-heart { font-size: 18px; color: var(--muted); cursor: pointer; transition: color 0.15s; }
.list-heart:hover, .list-heart.saved { color: var(--maroon); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 80px 40px; color: var(--muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 15px; line-height: 1.6; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,20,16,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 20px; width: 480px; max-width: 90vw; overflow: hidden; transform: translateY(16px); transition: transform 0.2s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { background: var(--cream); padding: 32px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); }
.modal-logo { width: 72px; height: 72px; border-radius: 14px; background: var(--white); display: flex; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0; border: 1px solid var(--border); }
.modal-logo img { max-width: 52px; max-height: 52px; object-fit: contain; }
.modal-title { font-family: 'Anton',  sans-serif; font-size: 22px; color: var(--ink); }
.modal-tag { display: inline-block; margin-top: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--maroon); background: rgba(107,30,46,0.08); border-radius: 4px; padding: 2px 8px; }
.modal-body { padding: 24px 32px 28px; }
.modal-desc { font-size: 14.5px; line-height: 1.65; color: var(--muted); }
.modal-actions { display: flex; gap: 10px; margin-top: 22px; }
.modal-btn { flex: 1; padding: 11px; border-radius: 10px; font-family: 'Anton',  sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
.modal-btn.primary { background: var(--maroon); color: white; }
.modal-btn.primary:hover { background: var(--maroon-light); }
.modal-btn.secondary { background: var(--cream); color: var(--ink); border: 1px solid var(--border); }
.modal-btn.secondary:hover { border-color: var(--maroon); color: var(--maroon); }

::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">Loupe</div>
      <div class="tagline">Vilnius Local Brands</div>
    </div>
    <div class="sidebar-search">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search brands…" oninput="onSearch(this.value)" />
      </div>
    </div>
    <div class="sidebar-label">Browse</div>
    <div class="nav-item active" id="nav-home" onclick="navigate('home')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </div>
    <div class="nav-item" id="nav-categories" onclick="navigate('categories')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Categories
    </div>
    <div class="nav-item" id="nav-all" onclick="navigate('all')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      All Brands
    </div>
    <div class="nav-item" id="nav-saved" onclick="navigate('saved')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Saved
    </div>
    <div class="sidebar-label" style="margin-top:6px;">Categories</div>
    <div id="sidebarCats"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="topbarTitle">Home</div>
        <div class="topbar-sub" id="topbarSub">Welcome to Loupe</div>
      </div>
      <div class="topbar-right">
        <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <div class="view-toggle" id="viewToggle" style="display:none">
          <div class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grid">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </div>
          <div class="view-btn" id="btn-list" onclick="setView('list')" title="List">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </div>
        </div>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-logo" id="modalLogo"></div>
      <div>
        <div class="modal-title" id="modalName"></div>
        <div class="modal-tag" id="modalTag"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-actions">
        <button class="modal-btn primary" onclick="visitModal()">Visit Website</button>
        <button class="modal-btn secondary" id="modalSaveBtn" onclick="toggleSaveModal()">♡ Save</button>
      </div>
    </div>
  </div>
</div>

let saved = {};
let viewMode = 'grid';
let page = 'home';
let activeCat = null;
let modalBrand = null;
let history = [];

function init() {
  buildSidebarCats();
  showPage('home');
}

function slug(s) { return s.replace(/[^a-z0-9]/gi,'-').toLowerCase(); }

function buildSidebarCats() {
  document.getElementById('sidebarCats').innerHTML =
    Object.keys(CAT_META).map(cat => {
      const n = BRANDS.filter(b=>b.category===cat).length;
      return `<div class="cat-item" id="sc-${slug(cat)}" onclick="navigate('category','${cat}')">
        <div class="cat-item-left"><span class="cat-emoji">${CAT_META[cat].emoji}</span><span>${cat}</span></div>
        <span class="cat-count">${n}</span>
      </div>`;
    }).join('');
}

function navigate(p, cat) {
  history.push({ page, activeCat });
  document.getElementById('searchInput').value = '';
  showPage(p, cat);
}

function goBack() {
  if (!history.length) return;
  const prev = history.pop();
  showPage(prev.page, prev.activeCat);
}

function showPage(p, cat) {
  page = p;
  activeCat = cat || null;
  updateNav();
  const content = document.getElementById('mainContent');
  const showBack = ['category','all','search'].includes(p);
  const showToggle = ['all','category','saved','search'].includes(p);
  document.getElementById('backBtn').style.display = showBack ? '' : 'none';
  document.getElementById('viewToggle').style.display = showToggle ? '' : 'none';

  if (p === 'home')       renderHome(content);
  else if (p === 'categories') renderCategories(content);
  else if (p === 'all')   renderList(content, BRANDS, 'All Brands', BRANDS.length + ' brands in Vilnius');
  else if (p === 'saved') renderSaved(content);
  else if (p === 'category') renderCategoryPage(content);
  else if (p === 'search') renderSearch(content);
}

function updateNav() {
  ['home','categories','all','saved'].forEach(id => document.getElementById('nav-'+id)?.classList.remove('active'));
  document.querySelectorAll('.cat-item').forEach(e=>e.classList.remove('active'));
  if (page==='home') document.getElementById('nav-home').classList.add('active');
  else if (page==='categories') document.getElementById('nav-categories').classList.add('active');
  else if (page==='all') document.getElementById('nav-all').classList.add('active');
  else if (page==='saved') document.getElementById('nav-saved').classList.add('active');
  else if (page==='category' && activeCat) document.getElementById('sc-'+slug(activeCat))?.classList.add('active');
}

    ${Object.entries(CAT_META).map(([cat,meta])=>{
      const n = BRANDS.filter(b=>b.category===cat).length;
      return `<div class="cat-hub-card" onclick="navigate('category','${cat}')">
        <div class="hub-emoji">${meta.emoji}</div>
        <div class="hub-name">${cat}</div>
        <div class="hub-count">${n} brand${n!==1?'s':''}</div>
        <div class="hub-subdesc">${meta.desc}</div>
        <div class="hub-arrow">→</div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── CATEGORY PAGE ── */
function renderCategoryPage(el) {
  const meta = CAT_META[activeCat] || { emoji:'📦', desc:'' };
  const brands = BRANDS.filter(b=>b.category===activeCat);
  setTop(`${meta.emoji} ${activeCat}`, `${brands.length} brand${brands.length!==1?'s':''} · ${meta.desc}`);
  renderList(el, brands);
}

/* ── BRAND LIST ── */
function renderList(el, brands, title, sub) {
  if (title) setTop(title, sub);
  if (!brands.length) { el.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>No brands found.</p></div>`; return; }
  el.innerHTML = viewMode==='grid'
    ? `<div class="brand-grid">${brands.map(cardHTML).join('')}</div>`
    : `<div class="brand-list">${brands.map(listItemHTML).join('')}</div>`;
}

/* ── SAVED ── */
function renderSaved(el) {
  const brands = BRANDS.filter(b=>saved[b.name]);
  setTop('Saved', brands.length ? `${brands.length} saved brand${brands.length!==1?'s':''}` : 'Your saved brands');
  if (!brands.length) { el.innerHTML=`<div class="empty-state"><div class="empty-icon">♡</div><p>No saved brands yet.<br>Heart a brand to save it here.</p></div>`; return; }
  el.innerHTML = viewMode==='grid'
    ? `<div class="brand-grid">${brands.map(cardHTML).join('')}</div>`
    : `<div class="brand-list">${brands.map(listItemHTML).join('')}</div>`;
}

/* ── SEARCH ── */
function onSearch(q) {
  const query = q.trim().toLowerCase();
  if (!query) { showPage('home'); return; }
  page = 'search'; activeCat = null; updateNav();
  document.getElementById('backBtn').style.display = '';
  document.getElementById('viewToggle').style.display = '';
  setTop('Search', `"${q}"`);
  const results = BRANDS.filter(b=>b.name.toLowerCase().includes(query)||b.desc.toLowerCase().includes(query)||b.category.toLowerCase().includes(query));
  const el = document.getElementById('mainContent');
  if (!results.length) { el.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>No results for "<strong>${q}</strong>".</p></div>`; return; }
  el.innerHTML = viewMode==='grid'
    ? `<div class="brand-grid">${results.map(cardHTML).join('')}</div>`
    : `<div class="brand-list">${results.map(listItemHTML).join('')}</div>`;
}

function renderSearch(el) { onSearch(document.getElementById('searchInput').value); }

/* ── TEMPLATES ── */
function esc(s) { return s.replace(/'/g,"\\'"); }
function logoImg(b, size=80) {
  const src = LOGOS[b.name];
  if (!src) return `<span style="font-size:${size*0.5}px">${b.emoji}</span>`;
  return `<img src="${src}" alt="${b.name}" style="max-width:${size}px;max-height:${size}px;object-fit:contain;" />`;
}

function cardHTML(b) {
  const s = saved[b.name];
  return `<div class="brand-card" onclick="openModal('${esc(b.name)}')">
    <div class="card-logo">${logoImg(b, 80)}
      <span class="card-heart${s?' saved':''}" onclick="event.stopPropagation();toggleSave('${esc(b.name)}',this)">${s?'♥':'♡'}</span>
    </div>
    <div class="card-body">
      <div class="card-cat-tag">${b.category}</div>
      <div class="card-name">${b.name}</div>
      <div class="card-desc">${b.desc}</div>
      <a class="card-link" href="${b.link}" target="_blank" onclick="event.stopPropagation()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Visit
      </a>
    </div>
  </div>`;
}

function listItemHTML(b) {
  const s = saved[b.name];
  return `<div class="brand-list-item" onclick="openModal('${esc(b.name)}')">
    <div class="list-logo">${logoImg(b, 36)}</div>
    <div class="list-info">
      <div class="list-name">${b.name}</div>
      <div class="list-desc">${b.desc}</div>
    </div>
    <div class="list-right">
      <span class="list-cat-tag">${b.category}</span>
      <span class="list-heart${s?' saved':''}" onclick="event.stopPropagation();toggleSave('${esc(b.name)}',this)">${s?'♥':'♡'}</span>
    </div>
  </div>`;
}

/* ── SAVE ── */
function toggleSave(name, el) {
  saved[name] = !saved[name];
  if (el) { el.textContent = saved[name]?'♥':'♡'; el.classList.toggle('saved', saved[name]); }
  if (modalBrand?.name===name) document.getElementById('modalSaveBtn').textContent = saved[name]?'♥ Saved':'♡ Save';
  if (page==='home') renderHome(document.getElementById('mainContent'));
}
function toggleSaveModal() { if (modalBrand) { toggleSave(modalBrand.name,null); document.getElementById('modalSaveBtn').textContent=saved[modalBrand.name]?'♥ Saved':'♡ Save'; } }

/* ── VIEW MODE ── */
function setView(v) {
  viewMode = v;
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  showPage(page, activeCat);
}

/* ── MODAL ── */
function openModal(name) {
  const b = BRANDS.find(x=>x.name===name); if (!b) return;
  modalBrand = b;
  document.getElementById('modalLogo').innerHTML = logoImg(b, 52);
  document.getElementById('modalName').textContent = b.name;
  document.getElementById('modalTag').textContent = b.category;
  document.getElementById('modalDesc').textContent = b.desc;
  document.getElementById('modalSaveBtn').textContent = saved[b.name]?'♥ Saved':'♡ Save';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) { if (!e||e.target===document.getElementById('modalOverlay')) { document.getElementById('modalOverlay').classList.remove('open'); modalBrand=null; } }
function visitModal() {
  if (!modalBrand) return;
  const a = document.createElement('a');
  a.href = modalBrand.link;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function setTop(t,s) { document.getElementById('topbarTitle').textContent=t; document.getElementById('topbarSub').textContent=s||''; }

init();
</script>
</body>
</html>
